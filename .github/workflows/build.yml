name: EAS Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# 🔽 Node 24 강제 전환 경고를 우회하기 위한 환경 변수 추가
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      # 🔽 assets 폴더가 없을 경우를 대비해 생성 명령을 추가했습니다.
      - name: Create placeholder assets
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p assets
          convert -size 1024x1024 xc:#0f1117 assets/icon.png
          convert -size 1024x1024 xc:#0f1117 assets/adaptive-icon.png
          convert -size 1024x1024 xc:#0f1117 assets/splash.png

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive

      - name: Download APK
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['artifacts']['buildUrl'])")
          curl -L "$BUILD_URL" -o flashcard.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashcard-apk
          path: flashcard.apk
          retention-days: 30
